<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultas SQL · BD Central</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>Central · Consola de Consultas</h1>
        <p class="subtitle">Base de Datos I</p>
      </div>
    </div>
    <div class="status" id="db-status">Comprobando conexión&hellip;</div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section>
        <h2>▦ Tablas</h2>
        <ul class="tables" id="table-list"></ul>
      </section>
    </aside>

    <section class="content">

      <div class="exp-card">
        <div class="exp-head">
          <h2>Experimento de índices</h2>
          <div class="scale-tabs" id="scale-tabs"></div>
        </div>

        <div class="exp-controls">
          <label class="field grow">
            <span>Consulta</span>
            <select id="exp-consulta"></select>
          </label>
          <label class="switch">
            <input type="checkbox" id="exp-indice" checked>
            <span>con índice</span>
          </label>
          <button id="exp-run" class="btn-primary">▶ Ejecutar</button>
        </div>
        <p class="exp-desc" id="exp-desc"></p>

        <div class="exp-result" id="exp-result"></div>
      </div>

      <div class="editor-wrap">
        <label for="sql" class="editor-label">Consola SQL (solo lectura)</label>
        <textarea id="sql" spellcheck="false"
          placeholder="Escribe una consulta SELECT…&#10;Ej:  SELECT * FROM cliente LIMIT 10;"></textarea>
        <div class="toolbar">
          <button id="run-btn" class="btn-primary">▶ Ejecutar <span class="kbd">Ctrl + Enter</span></button>
          <button id="clear-btn" class="btn-ghost">Limpiar</button>
          <span class="guard-note">Solo lectura · SELECT / WITH / EXPLAIN</span>
        </div>
      </div>

      <div class="result-card">
        <div class="result-meta" id="result-meta"></div>
        <div class="result-area" id="result-area"></div>
      </div>
    </section>
  </main>

  <script>
    window.SCHEMA = {{ schema_json | safe }};
    window.CONSULTAS = {{ consultas_json | safe }};
    window.SCALES = {{ scales_json | safe }};
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
